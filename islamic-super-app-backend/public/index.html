<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Islamic Foundation Quiz App</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="showcase-shell">
      <section class="brand-panel" aria-label="Islamic Foundation Quiz App">
        <div class="brand-mark">
          <span class="brand-arabic">الله</span>
        </div>
        <p class="brand-kicker">Islamic Foundation</p>
        <h1>Quiz App</h1>
      </section>

      <section class="phone-stage" aria-label="Tampilan aplikasi">
        <article class="phone phone-home">
          <div class="phone-top">
            <span class="signal-dot"></span>
            <strong>Quiz App</strong>
            <span class="coin-pill">420</span>
          </div>
          <div class="greeting-card">
            <p>Assalamu'alaikum</p>
            <h2>Choose a quiz to play</h2>
            <span>Keep your learning streak alive today.</span>
          </div>
          <div class="category-grid">
            <button class="quiz-card teal">
              <span class="card-icon">Q</span>
              <strong>Quran Knowledge</strong>
              <small>12 Questions</small>
            </button>
            <button class="quiz-card coral">
              <span class="card-icon">D</span>
              <strong>Duas & Fiqh</strong>
              <small>8 Questions</small>
            </button>
            <button class="quiz-card violet">
              <span class="card-icon">H</span>
              <strong>History</strong>
              <small>10 Questions</small>
            </button>
            <button class="quiz-card blue">
              <span class="card-icon">S</span>
              <strong>Seerah Quiz</strong>
              <small>15 Questions</small>
            </button>
          </div>
          <nav class="bottom-nav">
            <button>⌂</button>
            <button class="active">◆</button>
            <button>☰</button>
          </nav>
        </article>

        <article class="phone phone-question">
          <div class="question-header">
            <button class="icon-button">‹</button>
            <strong>Islamic World</strong>
            <button class="icon-button">?</button>
          </div>
          <div class="progress-card">
            <div>
              <span>Question 04</span>
              <strong>Which city is the first qibla located in?</strong>
            </div>
            <div class="timer">15</div>
          </div>
          <div class="answers">
            <button>Masjidil Haram</button>
            <button class="selected">Baitul Maqdis</button>
            <button>Madinah City</button>
            <button>Jabal Uhud</button>
          </div>
          <button class="next-button">Next Question</button>
          <div class="answer-ribbon">
            <span>1</span>
            <strong>Right Answer</strong>
          </div>
        </article>

        <article class="phone phone-welcome">
          <div class="welcome-inner">
            <div class="brand-mark large">
              <span class="brand-arabic">علم</span>
            </div>
            <p>Welcome to</p>
            <h2>Islamic Foundation Quiz App</h2>
            <button class="start-button">Start Quiz</button>
            <div class="difficulty-row">
              <button>Easy</button>
              <button class="active">Medium</button>
              <button>Hard</button>
            </div>
          </div>
        </article>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
