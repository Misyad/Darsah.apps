version: '3.8'

services:
  backend:
    build:
      context: ./islamic-super-app-backend
      dockerfile: Dockerfile
    ports:
      - "4001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./islamic-super-app-backend/data:/app/data
    restart: always

  frontend:
    build:
      context: ./islamic-super-app-web
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - backend
    restart: always
