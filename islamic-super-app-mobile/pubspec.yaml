name: islamic_super_app_mobile
description: Super App Keislaman dengan fitur ibadah, Al-Qur'an, dan Jadwal Sholat Geospasial.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # HTTP Client untuk mengambil data statis dari Node.js Backend
  http: ^1.1.0
  
  # Sensor & Geospasial
  geolocator: ^10.1.0
  flutter_qiblah: ^2.1.1
  
  # Astronomi Jadwal Sholat
  adhan: ^2.0.1
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
